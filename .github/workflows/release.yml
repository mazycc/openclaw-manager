name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      windows_offline_bundle:
        description: "Prepare and bundle Windows offline assets"
        required: false
        type: boolean
        default: false
      windows_offline_architectures:
        description: "Comma-separated architectures (x64,arm64,x86)"
        required: false
        type: string
        default: "x64"
      windows_offline_node_version:
        description: "Node.js version (latest-22 or x.y.z)"
        required: false
        type: string
        default: "latest-22"
      windows_offline_git_version:
        description: "Git for Windows version tag or latest"
        required: false
        type: string
        default: "latest"
      windows_offline_openclaw_version:
        description: "OpenClaw npm version or latest"
        required: false
        type: string
        default: "latest"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
      release_upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenClaw Manager ${{ github.ref_name }}
          body: |
            ## 🦞 OpenClaw Manager ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | **Windows** (installer) | `.msi` or `.exe` |
            | **macOS** (Apple Silicon & Intel) | `.dmg` |
            | **Linux** | `.deb` or `.AppImage` |

            ### What's New
            - **Startup Speed Optimization:** Frontend elements now load concurrently. Replaced rigid blocking queries with lazy background loading, heavily reducing time-to-render.
            - **React Lazy Chunking:** Split the frontend JS bundles. Heavy components (Settings, API tools) load entirely on demand, severely lightening the payload.
            - **Concurrent Shell Environment Check:** Rust environment assertions (`node`, `git`, OpenClaw CLI) now evaluate in parallel async via `tokio`, cutting startup delay significantly.
            - **Next-Gen 2026 AI Models:** Formally bumped and integrated the newest developer API endpoints matching the absolute latest models out right now: Anthropic (Claude Opus/Sonnet 4.6), OpenAI (GPT-5.4, o3-mini), Google (Gemini 3.1 Pro/Flash-Lite), DeepSeek, Qwen (3.5 Plus/Max), MiniMax (M2.5), and Venice AI (Llama 3.3 Default).
            - **Hotfix (v0.0.19):** Restored the Ollama local AI provider configuration that was accidentally dropped in the previous update.

            See the [full changelog](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.
          draft: true
          prerelease: false

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS (Intel)
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Prepare optional Windows offline bundle assets
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OFFLINE_BUNDLE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.windows_offline_bundle || '' }}
          OFFLINE_BUNDLE_DEFAULT: ${{ vars.WINDOWS_OFFLINE_BUNDLE }}
          OFFLINE_ARCH_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.windows_offline_architectures || '' }}
          OFFLINE_ARCH_DEFAULT: ${{ vars.WINDOWS_OFFLINE_ARCHITECTURES }}
          OFFLINE_NODE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.windows_offline_node_version || '' }}
          OFFLINE_NODE_DEFAULT: ${{ vars.WINDOWS_OFFLINE_NODE_VERSION }}
          OFFLINE_GIT_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.windows_offline_git_version || '' }}
          OFFLINE_GIT_DEFAULT: ${{ vars.WINDOWS_OFFLINE_GIT_VERSION }}
          OFFLINE_OPENCLAW_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.windows_offline_openclaw_version || '' }}
          OFFLINE_OPENCLAW_DEFAULT: ${{ vars.WINDOWS_OFFLINE_OPENCLAW_VERSION }}
        run: |
          $enabled = if ($env:OFFLINE_BUNDLE_INPUT) { $env:OFFLINE_BUNDLE_INPUT } elseif ($env:OFFLINE_BUNDLE_DEFAULT) { $env:OFFLINE_BUNDLE_DEFAULT } else { "false" }
          $enabled = $enabled.ToString().Trim().ToLowerInvariant()
          if ($enabled -notin @("true", "1", "yes", "on")) {
            Write-Host "Windows offline bundle disabled. Set windows_offline_bundle=true (workflow input) or WINDOWS_OFFLINE_BUNDLE=true (repo variable) to enable."
            exit 0
          }

          $arch = if ($env:OFFLINE_ARCH_INPUT) { $env:OFFLINE_ARCH_INPUT } elseif ($env:OFFLINE_ARCH_DEFAULT) { $env:OFFLINE_ARCH_DEFAULT } else { "x64" }
          $nodeVersion = if ($env:OFFLINE_NODE_INPUT) { $env:OFFLINE_NODE_INPUT } elseif ($env:OFFLINE_NODE_DEFAULT) { $env:OFFLINE_NODE_DEFAULT } else { "latest-22" }
          $gitVersion = if ($env:OFFLINE_GIT_INPUT) { $env:OFFLINE_GIT_INPUT } elseif ($env:OFFLINE_GIT_DEFAULT) { $env:OFFLINE_GIT_DEFAULT } else { "latest" }
          $openclawVersion = if ($env:OFFLINE_OPENCLAW_INPUT) { $env:OFFLINE_OPENCLAW_INPUT } elseif ($env:OFFLINE_OPENCLAW_DEFAULT) { $env:OFFLINE_OPENCLAW_DEFAULT } else { "latest" }

          node scripts/prepare-windows-offline-assets.mjs `
            --output-dir offline-assets/windows `
            --stage-dir src-tauri/resources/offline/windows `
            --architectures "$arch" `
            --node-version "$nodeVersion" `
            --git-version "$gitVersion" `
            --openclaw-version "$openclawVersion"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }}

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
