name: Build Windows Installer

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Read app version
        id: app_version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Windows bundles
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc --bundles nsis,msi --config src-tauri/tauri.windows.manual.conf.json

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-xiaobai-windows-${{ steps.app_version.outputs.version }}
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/**/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/**/*.msi
          if-no-files-found: error
          retention-days: 14
