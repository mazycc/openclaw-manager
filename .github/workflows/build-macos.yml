name: Build macOS DMG

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact_name: openclaw-xiaobai-macos-apple-silicon
          - target: x86_64-apple-darwin
            artifact_name: openclaw-xiaobai-macos-intel

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Read app version
        id: app_version
        run: |
          echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Build macOS DMG
        run: npm run tauri:build -- --target ${{ matrix.target }} --bundles dmg --config src-tauri/tauri.macos.manual.conf.json

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ steps.app_version.outputs.version }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/**/*.dmg
          if-no-files-found: error
          retention-days: 14
